<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Bollywave City | VishwaNova 2026</title>
    <meta
      name="description"
      content="Drive through an infinite procedurally generated retro synthwave city."
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <style>
      canvas {
        max-width: 100vw !important;
        max-height: 80vh !important;
        object-fit: contain;
      }
      body {
        overflow-x: hidden;
        touch-action: manipulation;
      }
      canvas {
        max-width: 100%;
        height: auto;
      }
    </style>

</head>
  <body>
    <div id="loader">
      <div class="loader-content">
        <div class="loader-grid"></div>
        <p class="loader-text">Initializing Mumbai 2077...</p>
      </div>
    </div>
    <audio
      id="bg-audio"
      loop
      src="https://cdn.pixabay.com/audio/2022/03/10/audio_115fb53152.mp3?v=3"
    ></audio>
    <button id="audio-toggle" aria-label="Toggle audio">🎵</button>
    <main id="app">
      <canvas id="synth-canvas"></canvas>
      <div id="hud">
        <div class="hud-speed">
          <span>SPEED</span><span id="speed-val">60</span><span>MPH</span>
        </div>
        <div class="hud-miles">
          <span>MILES</span><span id="miles-val">0</span>
        </div>
      </div>
      <div id="controls-bar">
        <button id="rain-btn">🌧️ Rain</button>
        <button id="neon-btn">💡 Neon</button>
      </div>
      <div id="hint">↑↓ Speed · ←→ Steer · R Rain · SPACE Honk</div>
    </main>
    <footer class="github-badge">
      <a href="https://github.com/AkshatRock/weboreel-hackathon" target="_blank"
        >⭐ GitHub Repo</a
      ><span>VishwaNova 2026</span>
    </footer>
    <script src="script.js"></script>
</body>
</html>
